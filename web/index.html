<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="덕질 컬렉션을 기록하고 정리하는 덕카이브, Deokive">
  <meta name="theme-color" content="#f7c9d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Deokive">
  <meta name="mobile-web-app-capable" content="yes">

  <meta property="og:title" content="Deokive">
  <meta property="og:description" content="덕질 컬렉션을 기록하고 정리하는 덕카이브">
  <meta property="og:type" content="website">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=20260623b">
  <link rel="icon" type="image/png" href="favicon.png?v=20260623b">
  <link rel="shortcut icon" type="image/png" href="favicon.png?v=20260623b">
  <link rel="manifest" href="manifest.json?v=20260623b">
  <title>Deokive</title>

  <style>
    :root {
      color-scheme: light;
      --deokive-ink: #1d1b20;
      --deokive-muted: #706a74;
      --deokive-line: #ece7ee;
      --deokive-pink-strong: #e65f91;
      --deokive-bg: #fffafd;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--deokive-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .app-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
      background: #fffafd;
      color: var(--deokive-ink);
    }

    .app-loading__phone {
      width: min(390px, 100%);
      min-height: 560px;
      border: 1px solid rgba(29, 27, 32, 0.08);
      border-radius: 34px;
      box-shadow: 0 24px 70px rgba(91, 55, 73, 0.14);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      text-align: center;
      padding: 34px 30px;
      box-sizing: border-box;
    }

    .app-loading__logo {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: #fff;
      border: 1px solid var(--deokive-line);
      box-shadow: 0 12px 28px rgba(230, 95, 145, 0.18);
      color: var(--deokive-pink-strong);
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 0;
    }

    .app-loading h1 {
      margin: 8px 0 0;
      max-width: 310px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
      word-break: keep-all;
    }

    .app-loading p {
      margin: 0;
      max-width: 340px;
      color: var(--deokive-muted);
      font-size: 15px;
      line-height: 1.65;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .app-loading__eta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      max-width: min(310px, 100%);
      padding: 6px 14px;
      border-radius: 999px;
      background: #1d1b20;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: anywhere;
      box-sizing: border-box;
    }

    .app-loading__eta[hidden] {
      display: none;
    }

    .app-loading__bar {
      width: 190px;
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #f1edf2;
    }

    .app-loading__bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--deokive-pink-strong);
      animation: deokive-loading 1.45s ease-in-out infinite;
    }

    .app-loading__note {
      max-width: 310px;
      padding: 12px 14px;
      border-radius: 18px;
      background: #fff5f9;
      border: 1px solid #f7d8e4;
      color: #7a4058;
      font-size: 13px;
      line-height: 1.55;
      word-break: keep-all;
      overflow-wrap: anywhere;
      box-sizing: border-box;
    }

    @keyframes deokive-loading {
      0% { transform: translateX(-115%); }
      50% { transform: translateX(82%); }
      100% { transform: translateX(245%); }
    }
  </style>
</head>
<body>
  <div class="app-loading" id="app-loading" role="status" aria-live="polite">
    <section class="app-loading__phone" aria-label="Deokive loading">
      <div class="app-loading__logo">D</div>
      <h1 id="app-loading-title">덕카이브 여는 중</h1>
      <p id="app-loading-body">
        화면을 준비하고 있어요.<br>
        잠시만 기다려 주세요.
      </p>
      <div class="app-loading__eta" id="app-loading-eta" hidden></div>
      <div class="app-loading__bar" aria-hidden="true"></div>
      <div class="app-loading__note" id="app-loading-note">
        화면이 오래 멈춰 있으면 새로고침해 주세요.
      </div>
    </section>
  </div>

  <script>
    function deokiveSetLoadingCopy(copy) {
      const title = document.getElementById('app-loading-title');
      const body = document.getElementById('app-loading-body');
      const eta = document.getElementById('app-loading-eta');
      const note = document.getElementById('app-loading-note');
      if (title && copy.title) title.textContent = copy.title;
      if (body && copy.body) body.innerHTML = copy.body;
      if (eta) {
        if (copy.eta) {
          eta.hidden = false;
          eta.textContent = copy.eta;
        } else {
          eta.hidden = true;
          eta.textContent = '';
        }
      }
      if (note && copy.note) note.textContent = copy.note;
    }

    window.deokiveLoadingFailed = function () {
      const note = document.getElementById('app-loading-note');
      if (!note) return;
      note.textContent = '앱 파일을 불러오지 못했어요. 잠시 뒤 새로고침하면 다시 열립니다.';
    };

    window.addEventListener('flutter-first-frame', function () {
      if (window.deokiveHoldLoadingScreen) return;
      const loading = document.getElementById('app-loading');
      if (loading) loading.remove();
    });

    window.setTimeout(function () {
      if (window.deokiveHoldLoadingScreen) return;
      const note = document.getElementById('app-loading-note');
      if (!note) return;
      note.textContent = '로딩이 길어지고 있어요. 1분 뒤에도 그대로면 새로고침해 주세요.';
    }, 45000);

    async function deokiveLoadSiteStatus() {
      try {
        const statusPath = window.location.hostname.endsWith('github.io')
          ? '/Deokive/data/site_status_public.json'
          : '/data/site_status_public.json';
        const response = await fetch(statusPath + '?v=' + Date.now(), {
          cache: 'no-store',
        });
        if (!response.ok) return { mode: 'normal' };
        return await response.json();
      } catch (_) {
        return { mode: 'normal' };
      }
    }

    function deokiveStartFlutter() {
      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      script.onerror = function () {
        window.deokiveLoadingFailed && window.deokiveLoadingFailed();
      };
      document.body.appendChild(script);
    }

    deokiveLoadSiteStatus().then(function (status) {
      const mode = status && status.mode;
      if (mode === 'notice') {
        window.deokiveHoldLoadingScreen = true;
        deokiveSetLoadingCopy({
          title: '곧 업데이트가 시작돼요',
          body: '1분 뒤 업데이트를 시작하오니 작업 중이라면 종료 부탁드려요.',
          eta: status.eta || '업데이트 시작 1분 전',
          note: status.message || '잠시 후 새 버전으로 교체됩니다.',
        });
        return;
      }
      if (mode === 'updating') {
        window.deokiveHoldLoadingScreen = true;
        deokiveSetLoadingCopy({
          title: '지금 업데이트 중이에요',
          body: '새 DB를 반영하고 있어요.<br>잠시 뒤 다시 접속해 주세요.',
          eta: status.eta || '예상 업데이트 시간 5-15분',
          note: status.message || 'GitHub Pages 반영이 끝나면 다시 열립니다.',
        });
        return;
      }
      deokiveStartFlutter();
    });

    window.addEventListener('load', async function () {
      if (!('serviceWorker' in navigator)) return;
      const host = window.location.hostname;
      const isLocalHost =
        host === 'localhost' ||
        host === '127.0.0.1' ||
        host === '::1';

      if (isLocalHost) {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) {
            await reg.unregister();
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (_) {}
        return;
      }

      navigator.serviceWorker.register('deokive_service_worker.js?v=20260722-statusfix1');
    });
  </script>
</body>
</html>
