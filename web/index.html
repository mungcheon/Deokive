<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="덕질 컬렉션을 기록하고 정리하는 적응형 웹 아카이브, Deokive">
  <meta name="theme-color" content="#f7c9d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Deokive">
  <meta name="mobile-web-app-capable" content="yes">

  <meta property="og:title" content="Deokive">
  <meta property="og:description" content="덕질 컬렉션을 기록하고 정리하는 적응형 웹 아카이브">
  <meta property="og:type" content="website">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=20260623b">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=20260623b"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png?v=20260623b"/>

  <title>Deokive</title>
  <link rel="manifest" href="manifest.json?v=20260623b">
  <style>
    :root {
      color-scheme: light;
      --deokive-ink: #1d1b20;
      --deokive-muted: #706a74;
      --deokive-line: #ece7ee;
      --deokive-pink: #f7c9d9;
      --deokive-pink-strong: #e65f91;
      --deokive-bg: #fffafd;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--deokive-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .app-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
      background: #fffafd;
      color: var(--deokive-ink);
    }

    .app-loading__phone {
      width: min(390px, 100%);
      min-height: 560px;
      border: 1px solid rgba(29, 27, 32, 0.08);
      border-radius: 34px;
      box-shadow: 0 24px 70px rgba(91, 55, 73, 0.14);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      text-align: center;
      padding: 34px 30px;
      box-sizing: border-box;
    }

    .app-loading__logo {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: #fff;
      border: 1px solid var(--deokive-line);
      box-shadow: 0 12px 28px rgba(230, 95, 145, 0.18);
      color: var(--deokive-pink-strong);
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 0;
    }

    .app-loading h1 {
      margin: 8px 0 0;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .app-loading p {
      margin: 0;
      color: var(--deokive-muted);
      font-size: 15px;
      line-height: 1.65;
      word-break: keep-all;
    }

    .app-loading__bar {
      width: 190px;
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #f1edf2;
    }

    .app-loading__bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--deokive-pink-strong);
      animation: deokive-loading 1.45s ease-in-out infinite;
    }

    .app-loading__note {
      max-width: 300px;
      padding: 12px 14px;
      border-radius: 18px;
      background: #fff5f9;
      border: 1px solid #f7d8e4;
      color: #7a4058;
      font-size: 13px;
      line-height: 1.55;
    }

    .app-loading__eta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: #1d1b20;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    @keyframes deokive-loading {
      0% { transform: translateX(-115%); }
      50% { transform: translateX(82%); }
      100% { transform: translateX(245%); }
    }
  </style>
</head>
<body>
  <div class="app-loading" id="app-loading" role="status" aria-live="polite">
    <section class="app-loading__phone" aria-label="Deokive loading">
      <div class="app-loading__logo">D</div>
      <h1>지금 수정 중이에요</h1>
      <p>
        굿즈 DB와 이미지를 정리해서 다시 올리는 중이에요.<br>
        흰 화면 대신 이 안내가 보이면 정상적으로 배포 대기 중입니다.
      </p>
      <div class="app-loading__eta">예상 업데이트 시간 5-15분</div>
      <div class="app-loading__bar" aria-hidden="true"></div>
      <div class="app-loading__note" id="app-loading-note">
        화면이 오래 멈춰 있으면 새로고침하거나 잠시 뒤 다시 접속해 주세요.
      </div>
    </section>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async onerror="window.deokiveLoadingFailed && window.deokiveLoadingFailed()"></script>
  <script>
    window.deokiveLoadingFailed = function () {
      const note = document.getElementById('app-loading-note');
      if (!note) return;
      note.textContent = '앱 파일을 불러오지 못했어요. 배포가 끝난 뒤 새로고침하면 다시 열립니다.';
    };

    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('app-loading');
      if (loading) loading.remove();
    });

    window.setTimeout(function () {
      const note = document.getElementById('app-loading-note');
      if (!note) return;
      note.textContent = '업데이트가 길어지고 있어요. GitHub Pages 캐시 반영 중일 수 있으니 1분 뒤 새로고침해 주세요.';
    }, 45000);

    window.addEventListener('load', async function () {
      if (!('serviceWorker' in navigator)) return;
      const host = window.location.hostname;
      const isLocalHost =
        host === 'localhost' ||
        host === '127.0.0.1' ||
        host === '::1';

      if (isLocalHost) {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) {
            await reg.unregister();
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (_) {}
        return;
      }

      navigator.serviceWorker.register('deokive_service_worker.js?v=20260627-localfix1');
    });
  </script>
</body>
</html>
