<head>
  <!--

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="덕질 컬렉션을 기록하고 정리하는 적응형 웹 아카이브, Deokive">
  <meta name="theme-color" content="#f7c9d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Deokive">
  <meta name="mobile-web-app-capable" content="yes">

  <meta property="og:title" content="Deokive">
  <meta property="og:description" content="덕질 컬렉션을 기록하고 정리하는 적응형 웹 아카이브">
  <meta property="og:type" content="website">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=20260623b">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=20260623b"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png?v=20260623b"/>

  <title>Deokive</title>
  <link rel="manifest" href="manifest.json?v=20260623b">
  <script>
    if (window.location.hostname === 'mungcheon.github.io') {
      window.location.replace('https://deokive.kro.kr/' + window.location.search + window.location.hash);
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', async function () {
      if (!('serviceWorker' in navigator)) return;
      const host = window.location.hostname;
      const isLocalHost =
        host === 'localhost' ||
        host === '127.0.0.1' ||
        host === '::1';

      if (isLocalHost) {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) {
            await reg.unregister();
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (_) {}
        return;
      }

      navigator.serviceWorker.register('deokive_service_worker.js?v=20260721-root2');
    });
  </script>
</body>
</html>
