  <style>
    :root {
      color-scheme: light;
      --deokive-ink: #1d1b20;
      --deokive-muted: #706a74;
      --deokive-line: #ece7ee;
      --deokive-pink-strong: #e65f91;
      --deokive-bg: #fffafd;
    }
    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--deokive-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    .app-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
      background: #fffafd;
      color: var(--deokive-ink);
    }
    .app-loading__phone {
      width: min(390px, 100%);
      min-height: 560px;
      border: 1px solid rgba(29, 27, 32, 0.08);
      border-radius: 34px;
      box-shadow: 0 24px 70px rgba(91, 55, 73, 0.14);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      text-align: center;
      padding: 34px 30px;
      box-sizing: border-box;
    }
    .app-loading__logo {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: #fff;
      border: 1px solid var(--deokive-line);
      box-shadow: 0 12px 28px rgba(230, 95, 145, 0.18);
      color: var(--deokive-pink-strong);
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 0;
    }
    .app-loading h1 {
      margin: 8px 0 0;
      max-width: 310px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    .app-loading p {
      margin: 0;
      max-width: 340px;
      color: var(--deokive-muted);
      font-size: 15px;
      line-height: 1.65;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    .app-loading__eta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      max-width: min(310px, 100%);
      padding: 6px 14px;
      border-radius: 999px;
      background: #1d1b20;
      color: #fff;
      font-size: clamp(11px, 3vw, 13px);
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-sizing: border-box;
    }
    .app-loading__eta[hidden] {
      display: none;
    }
    .app-loading__bar {
      width: 190px;
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #f1edf2;
    }
    .app-loading__bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--deokive-pink-strong);
      animation: deokive-loading 1.45s ease-in-out infinite;
    }
    .app-loading__note {
      max-width: 310px;
      padding: 12px 14px;
      border-radius: 18px;
      background: #fff5f9;
      border: 1px solid #f7d8e4;
      color: #7a4058;
      font-size: 13px;
      line-height: 1.55;
      word-break: keep-all;
      overflow-wrap: break-word;
      box-sizing: border-box;
    }
    @keyframes deokive-loading {
      0% { transform: translateX(-115%); }
      50% { transform: translateX(82%); }
      100% { transform: translateX(245%); }

<body>
  <div class="app-loading" id="app-loading" role="status" aria-live="polite">
    <section class="app-loading__phone" aria-label="Deokive loading">
      <div class="app-loading__logo">D</div>

    </section>
  </div>
  <script>
    function deokiveSetLoadingCopy(copy) {
      const title = document.getElementById('app-loading-title');
      const body = document.getElementById('app-loading-body');
      const eta = document.getElementById('app-loading-eta');
      const note = document.getElementById('app-loading-note');
      if (title && copy.title) title.textContent = copy.title;
      if (body && copy.body) body.innerHTML = copy.body;
      if (eta) {
        if (copy.eta) {
          eta.hidden = false;
          eta.textContent = copy.eta;
        } else {
          eta.hidden = true;
          eta.textContent = '';
        }
      }
      if (note && copy.note) note.textContent = copy.note;
    }
    window.deokiveLoadingFailed = function () {
      const note = document.getElementById('app-loading-note');
      if (!note) return;
      note.textContent = '???뚯씪??遺덈윭?ㅼ? 紐삵뻽?댁슂. ?좎떆 ???덈줈怨좎묠?섎㈃ ?ㅼ떆 ?대┰?덈떎.';
    };
    window.addEventListener('flutter-first-frame', function () {
      if (window.deokiveHoldLoadingScreen) return;
      const loading = document.getElementById('app-loading');
      if (loading) loading.remove();
    });
    window.setTimeout(function () {
      if (window.deokiveHoldLoadingScreen) return;
      const note = document.getElementById('app-loading-note');
      if (!note) return;
      note.textContent = '濡쒕뵫??湲몄뼱吏怨??덉뼱?? 1遺꾩씠 吏?섎룄 洹몃?濡쒕㈃ ?덈줈怨좎묠??二쇱꽭??';
    }, 45000);
    async function deokiveLoadSiteStatus() {
      try {
        const statusPath = window.location.hostname.endsWith('github.io')
          ? '/Deokive/data/site_status_public.json'
          : '/data/site_status_public.json';
        const response = await fetch(statusPath + '?v=' + Date.now(), {
          cache: 'no-store',
        });
        if (!response.ok) return { mode: 'normal' };
        return await response.json();
      } catch (_) {
        return { mode: 'normal' };
      }
    }
    function deokiveStartFlutter() {
      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js?v=20260724-home-db-panel1';
      script.async = true;
      script.onerror = function () {
        window.deokiveLoadingFailed && window.deokiveLoadingFailed();
      };
      document.body.appendChild(script);
    }
    deokiveLoadSiteStatus().then(function (status) {
      const mode = status && status.mode;
      if (mode === 'notice') {
        window.deokiveHoldLoadingScreen = true;
        deokiveSetLoadingCopy({
          title: '怨??낅뜲?댄듃媛 ?쒖옉?쇱슂',
          body: '1遺????낅뜲?댄듃瑜??쒖옉?⑸땲??<br>?묒뾽 以묒씠?쇰㈃ 醫낅즺 遺?곷뱶?ㅼ슂.',
          eta: status.eta || '?낅뜲?댄듃 ?쒖옉 1遺???,
          note: status.message || '?좎떆 ????踰꾩쟾?쇰줈 援먯껜?⑸땲??',
        });
        return;
      }
      if (mode === 'updating') {
        window.deokiveHoldLoadingScreen = true;
        deokiveSetLoadingCopy({
          title: '吏湲??낅뜲?댄듃 以묒씠?먯슂',
          body: '?깃낵 DB瑜?諛섏쁺?섍퀬 ?덉뼱??<br>?좎떆 ???ㅼ떆 ?묒냽??二쇱꽭??',
          eta: status.eta || '?덉긽 ?낅뜲?댄듃 ?쒓컙 5-15遺?,
          note: status.message || 'GitHub Pages 諛섏쁺???앸굹硫??ㅼ떆 ?대┰?덈떎.',
        });
        return;
      }
      deokiveStartFlutter();
    });
    window.addEventListener('load', async function () {
      if (!('serviceWorker' in navigator)) return;
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) {
          await reg.unregister();
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } catch (_) {}
    });
  </script>
