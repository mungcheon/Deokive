<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="./">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="덕질 컬렉션을 기록하고 정리하는 적응형 웹 아카이브, Deokive">
  <meta name="theme-color" content="#f7c9d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Deokive">
  <meta name="mobile-web-app-capable" content="yes">

  <meta property="og:title" content="Deokive">
  <meta property="og:description" content="덕질 컬렉션을 기록하고 정리하는 적응형 웹 아카이브">
  <meta property="og:type" content="website">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=20260623b">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=20260623b"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png?v=20260623b"/>

  <title>Deokive</title>
  <link rel="manifest" href="manifest.json?v=20260623b">
  <style>
    html,
    body {
      background: #fff2f7;
      margin: 0;
      min-height: 100%;
    }

    #deokive-boot {
      align-items: center;
      background: #fff2f7;
      color: #c54f88;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      inset: 0;
      justify-content: center;
      position: fixed;
      z-index: 9999;
    }

    .deokive-boot-card {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      text-align: center;
    }

    .deokive-boot-logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .deokive-boot-copy {
      color: #d86b9d;
      font-size: 14px;
      font-weight: 600;
    }

    .deokive-boot-spinner {
      animation: deokive-spin 0.9s linear infinite;
      border: 3px solid rgba(216, 107, 157, 0.2);
      border-top-color: #ff5fa2;
      border-radius: 999px;
      height: 28px;
      width: 28px;
    }

    @keyframes deokive-spin {
      to {
        transform: rotate(360deg);
      }
    }

  </style>
</head>
<body>
  <div id="deokive-boot" aria-label="Deokive loading">
    <div class="deokive-boot-card">
      <div class="deokive-boot-spinner"></div>
      <div class="deokive-boot-logo">Deokive</div>
      <div class="deokive-boot-copy">굿즈 아카이브를 불러오는 중이에요</div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    (async function bootDeokive() {
      const hideBoot = () => {
        const boot = document.getElementById('deokive-boot');
        if (boot) {
          boot.style.opacity = '0';
          boot.style.transition = 'opacity 220ms ease';
          window.setTimeout(() => boot.remove(), 240);
        }
      };
      const bootObserver = new MutationObserver(() => {
        if (document.querySelector('flutter-view')) {
          window.setTimeout(hideBoot, 600);
          bootObserver.disconnect();
        }
      });
      bootObserver.observe(document.documentElement, {
        childList: true,
        subtree: true,
      });

      const host = window.location.hostname;

      const isLocalHost =
        host === 'localhost' ||
        host === '127.0.0.1' ||
        host === '::1';

      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) {
            await reg.unregister();
          }
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } catch (_) {}

      const script = document.createElement('script');
      script.src = isLocalHost
        ? 'flutter_bootstrap.js'
        : 'flutter_bootstrap.js?v=20260721-loading-screen';
      script.async = true;
      document.body.appendChild(script);
      window.setTimeout(hideBoot, 45000);
    })();
  </script>
</body>
</html>
