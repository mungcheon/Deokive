name: Update public catalog reports

on:
  workflow_dispatch:
  schedule:
    # Daily 04:20 KST
    - cron: "20 19 * * *"

permissions:
  contents: write

jobs:
  update-public-reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish 1-minute update notice
        run: |
          git config user.name "deokive-catalog-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          import json
          from pathlib import Path

          Path("data/site_status_public.json").write_text(
              json.dumps(
                  {
                      "mode": "notice",
                      "message": "1분 뒤 업데이트를 시작하오니 작업을 종료해 주세요.",
                      "eta": "업데이트 시작 1분 전",
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY
          git add data/site_status_public.json
          if git diff --cached --quiet; then
            echo "Update notice already published."
          else
            git commit -m "chore: announce public catalog update"
            git push
          fi
          sleep 60

      - name: Mark site updating
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          Path("data/site_status_public.json").write_text(
              json.dumps(
                  {
                      "mode": "updating",
                      "message": "공개 DB를 반영하고 있어요. 잠시 뒤 다시 접속해 주세요.",
                      "eta": "예상 업데이트 시간 5-15분",
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Build public review batches
        run: |
          python tools/build_image_enrichment_queue.py --input data/catalog_public.json --json-output data/catalog_missing_image_work_queue_public.json --csv-output data/catalog_missing_image_work_queue_public.csv
          python tools/build_source_discovery_review_batches_public.py
          python tools/build_catalog_metadata_review_batches_public.py
          python tools/build_deduplication_review_batches_public.py
          python tools/build_animation_category_review_batches_public.py
          python tools/build_ichiban_kuji_metadata_review_batches_public.py
          python tools/build_requested_focus_review_batches_public.py
          python tools/build_confirmed_import_readiness_public.py
          python tools/build_animate_missing_image_search_public.py --write
          python tools/build_goodsmile_missing_image_search_public.py --write
          python tools/build_kotobukiya_movic_missing_image_search_public.py --write
          python tools/build_jump_furyu_taito_missing_image_search_public.py --write
          python tools/build_secondary_official_missing_image_search_public.py --write
          python tools/build_manual_missing_image_source_discovery_public.py --write
          python tools/build_generic_storefront_missing_image_source_public.py --write
          python tools/build_gotouchi_representative_image_attachment_public.py --write
          python tools/build_missing_image_report_coverage_public.py --write
          python tools/build_source_discovery_action_queue_public.py
          python tools/build_metadata_action_queue_public.py
          python tools/build_image_attachment_action_queue_public.py
          python tools/build_deduplication_action_queue_public.py
          python tools/build_deduplication_fast_review_public.py --write
          python tools/build_ichiban_kuji_metadata_action_queue_public.py
          python tools/build_ichiban_kuji_metadata_fast_review_public.py --write
          python tools/build_requested_focus_action_queue_public.py
          python tools/build_animation_category_action_queue_public.py
          python tools/build_animation_category_split_review_public.py

      - name: Refresh public catalog reports
        run: |
          python tools/update_public_catalog_reports.py --write
          python tools/build_catalog_execution_plan_public.py
          python tools/update_public_catalog_reports.py --write

      - name: Validate generated public files
        run: python tools/update_public_catalog_reports.py

      - name: Commit public report updates
        run: |
          git config user.name "deokive-catalog-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/site_status_public.json \
            data/catalog_public_meta.json \
            data/catalog_quality_public.json \
            data/catalog_image_backlog_public.json \
            data/catalog_image_candidate_review_public.json \
            data/catalog_image_asset_audit_public.json \
            data/catalog_missing_image_priority_public.json \
            data/animate_missing_image_search_public.json \
            data/goodsmile_missing_image_search_public.json \
            data/kotobukiya_movic_missing_image_search_public.json \
            data/jump_furyu_taito_missing_image_search_public.json \
            data/secondary_official_missing_image_search_public.json \
            data/manual_missing_image_source_discovery_public.json \
            data/generic_storefront_missing_image_source_public.json \
            data/gotouchi_representative_image_attachment_public.json \
            data/catalog_missing_image_report_coverage_public.json \
            data/ensky_missing_image_cache_coverage_public.json \
            data/ensky_search_page_probe_public.json \
            data/stellive_fanding_candidates_public.json \
            data/catalog_missing_image_work_queue_public.json \
            data/catalog_missing_image_work_queue_public.csv \
            data/catalog_image_enrichment_batches_public.json \
            data/source_discovery_queue_public.json \
            data/source_discovery_review_batches_public.json \
            data/source_discovery_action_queue_public.json \
            data/catalog_metadata_backlog_public.json \
            data/catalog_metadata_review_batches_public.json \
            data/catalog_metadata_action_queue_public.json \
            data/catalog_image_attachment_action_queue_public.json \
            data/catalog_deduplication_public.json \
            data/catalog_deduplication_review_batches_public.json \
            data/catalog_deduplication_action_queue_public.json \
            data/catalog_deduplication_fast_review_public.json \
            data/animation_goods_categories_public.json \
            data/animation_category_review_batches_public.json \
            data/animation_category_action_queue_public.json \
            data/animation_category_split_review_public.json \
            data/ichiban_kuji_history_public.json \
            data/ichiban_kuji_metadata_review_batches_public.json \
            data/ichiban_kuji_metadata_action_queue_public.json \
            data/ichiban_kuji_metadata_fast_review_public.json \
            data/requested_focus_enrichment_public.json \
            data/requested_focus_review_batches_public.json \
            data/requested_focus_action_queue_public.json \
            data/catalog_confirmed_import_readiness_public.json \
            data/catalog_execution_plan_public.json \
            data/danganronpa_missing_media_public.json \
            data/generic_source_patch_candidates_public.json \
            data/catalog_operations_public.json \
            data/catalog_agent_work_queue_public.json
          if git diff --cached --quiet; then
            echo "No public catalog report changes."
          else
            git commit -m "chore: refresh public catalog reports"
            git push
          fi

      - name: Reopen public site
        if: always()
        run: |
          git config user.name "deokive-catalog-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          import json
          from pathlib import Path

          Path("data/site_status_public.json").write_text(
              json.dumps({"mode": "normal", "message": "", "eta": ""}, ensure_ascii=False, indent=2)
              + "\n",
              encoding="utf-8",
          )
          PY
          git add data/site_status_public.json
          if git diff --cached --quiet; then
            echo "Public site status already normal."
          else
            git commit -m "chore: reopen public site"
            git push
          fi
